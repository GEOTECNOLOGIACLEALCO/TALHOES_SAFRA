<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Clealco Geo - Rotas Inteligentes</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .ui-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1001;
            background: rgba(255, 255, 255, 0.98); padding: 18px;
            border-radius: 15px; width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: all 0.4s ease; max-height: 90vh; overflow-y: auto;
        }
        .ui-panel.hidden { transform: translateX(-340px); opacity: 0; }
        .toggle-btn { position: absolute; top: 15px; left: 15px; z-index: 1002; background: #1b5e20; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        h2 { margin: 0 0 10px; font-size: 15px; color: #1b5e20; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .label-ui { font-size: 9px; font-weight: 700; color: #888; margin-top: 12px; text-transform: uppercase; }
        select, input[type="file"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; font-size: 13px; }

        .farm-label {
            background: rgba(0,0,0,0.7); border: 1px solid #76FF03; border-radius: 4px;
            color: #fff; padding: 3px 8px; font-size: 11px; font-weight: bold;
            white-space: nowrap; pointer-events: none; text-shadow: 1px 1px 1px #000;
        }

        .mode-selector { display: flex; background: #eee; border-radius: 10px; padding: 3px; margin-top: 8px; gap: 2px; }
        .mode-selector input { display: none; }
        .mode-selector label { flex: 1; text-align: center; padding: 10px 0; font-size: 8px; font-weight: 800; cursor: pointer; border-radius: 8px; }
        .mode-selector input:checked + label { background: #1b5e20; color: white; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
        .btn-group label { flex: 1 1 30%; background: #f0f0f0; padding: 10px 2px; text-align: center; border-radius: 8px; font-size: 10px; cursor: pointer; font-weight: 600; }
        .btn-group input { display: none; }
        .btn-group input:checked + label { background: #1b5e20; color: #fff; }

        /* Botão de Rota - Visível apenas quando solicitado */
        .route-btn { 
            display: none; width: 100%; background: #4285F4; color: white; 
            text-align: center; padding: 14px; border-radius: 10px; 
            margin-top: 15px; font-weight: 700; text-decoration: none; 
            font-size: 12px; box-shadow: 0 4px 10px rgba(66,133,244,0.3);
        }

        .main-logo { position: absolute; top: 15px; right: 15px; z-index: 1000; width: 100px; }
        .dev-footer { position: absolute; bottom: 8px; right: 15px; z-index: 1000; font-size: 9px; color: rgba(255,255,255,0.4); }
        .leaflet-top.leaflet-right { margin-top: 60px !important; }
        .check-container { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <script>if(sessionStorage.getItem('autenticado')!=='true') window.location.href='login.html';</script>

    <button class="toggle-btn" id="openBtn" style="display: none;">☰</button>
    <img src="logo.png" class="main-logo">
    <div class="dev-footer">Desenvolvido por Geotecnologias</div>

    <div class="ui-panel" id="panel">
        <h2>Painel Safra <span class="close-icon" id="closeBtn">×</span></h2>
        
        <div class="label-ui">Modo de Operação</div>
        <div class="mode-selector">
            <input type="radio" id="modeA" name="routeMode" value="atual" checked><label for="modeA">📍 ATUAL</label>
            <input type="radio" id="modeF" name="routeMode" value="farms"><label for="modeF">🚜 ENTRE FAZ</label>
            <input type="radio" id="modeT" name="routeMode" value="txt"><label for="modeT">📄 LISTA TXT</label>
        </div>

        <div id="selector-box">
            <div class="label-ui" id="lab1">Fazenda / Origem</div>
            <select id="fazendaSelect"><option value="">Selecionar...</option></select>
        </div>

        <div id="dest-box" style="display:none;">
            <div class="label-ui">Fazenda Destino</div>
            <select id="fazendaDestSelect"><option value="">Selecionar...</option></select>
        </div>

        <div id="txt-box" style="display:none;">
            <div class="label-ui">Importar TXT</div>
            <input type="file" id="fileInput" accept=".txt">
        </div>

        <div class="check-container">
            <input type="checkbox" id="checkLabels" checked>
            <label for="checkLabels">Exibir Nomes</label>
        </div>
        
        <a id="routeLink" target="_blank" class="route-btn">🚗 TRAÇAR ROTA NO MAPS</a>

        <div class="label-ui">Satélite (NDVI PURO)</div>
        <div class="btn-group">
            <input type="radio" id="mNdvi" name="viewMode" value="ndvi" checked><label for="mNdvi">NDVI</label>
            <input type="radio" id="mReal" name="viewMode" value="real"><label for="mReal">REAL</label>
        </div>
        <select id="dateSelect"></select>

        <div class="label-ui">Mapas Temáticos</div>
        <div class="btn-group">
            <input type="radio" id="tNone" name="viewMode" value="none"><label for="tNone">LIMPO</label>
            <input type="radio" id="tEst" name="viewMode" value="ESTAGIO"><label for="tEst">ESTÁGIO</label>
            <input type="radio" id="tSta" name="viewMode" value="STATUS"><label for="tSta">STATUS</label>
            <input type="radio" id="tFaz" name="viewMode" value="TP_FAZ"><label for="tFaz">TP_FAZ</label>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>
    <script src="config.js"></script>
    <script>
        var map = L.map('map', {zoomControl: false, tap: false}).setView([-21.2, -50.4], 12);
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {attr: 'Google'}).addTo(map);
        L.control.locate({position: 'topright'}).addTo(map);
        L.control.zoom({position: 'bottomleft'}).addTo(map);

        const panel = document.getElementById('panel'), openBtn = document.getElementById('openBtn'), closeBtn = document.getElementById('closeBtn');
        closeBtn.onclick = () => { panel.classList.add('hidden'); openBtn.style.display = 'block'; };
        openBtn.onclick = () => { panel.classList.remove('hidden'); openBtn.style.display = 'none'; };

        var satLayer = null, vectorLayer = null, colFaz = "", labelLayer = L.layerGroup().addTo(map);
        var listaFiltroTxt = [];

        function getStyle(f) {
            const m = document.querySelector('input[name="viewMode"]:checked').value;
            const mode = document.querySelector('input[name="routeMode"]:checked').value;
            const fz = (f.properties[colFaz] || "").toString().trim().toUpperCase();
            let s = { color: "#000", weight: 1.5, fillColor: 'transparent', fillOpacity: 0 };
            
            const cores = { 'ESTAGIO': { '1': '#0039A6', '2': '#00BFFF', '3': '#00CD00', '4': '#FFFF00', '5': '#FF0000', '6+': '#8B0000', 'REFORMA': '#FF1493' }, 'STATUS': { 'COLHEITA': '#0039A6', 'PLANTIO': '#76FF03', 'MUDA': '#FF1493' }, 'TP_FAZ': { 'PROPRIA': '#FF8C00', 'FORNECEDORES': '#00CED1' } };
            
            if (cores[m]) {
                const v = (f.properties[m] || "").toString().toUpperCase().trim();
                if (cores[m][v]) { s.fillColor = cores[m][v]; s.fillOpacity = 0.8; }
            }

            let d = false;
            const s1 = document.getElementById('fazendaSelect').value.toUpperCase();
            const s2 = document.getElementById('fazendaDestSelect').value.toUpperCase();

            if (mode === 'txt' && listaFiltroTxt.length > 0) { if (listaFiltroTxt.includes(fz)) d = true; } 
            else if (s1 !== "" && (fz === s1 || fz === s2)) d = true;

            if (d) { s.color = "#FFFF00"; s.weight = 3.5; s.fillOpacity = s.fillOpacity > 0 ? 0.9 : 0.2; }
            else if ((mode === 'txt' && listaFiltroTxt.length > 0) || (s1 !== "")) { s.fillOpacity *= 0.1; s.color = "rgba(0,0,0,0.1)"; }
            return s;
        }

        function updateLabels() {
            labelLayer.clearLayers();
            if (!document.getElementById('checkLabels').checked) return;
            const mode = document.querySelector('input[name="routeMode"]:checked').value;
            const s1 = document.getElementById('fazendaSelect').value.toUpperCase();
            const s2 = document.getElementById('fazendaDestSelect').value.toUpperCase();

            let groups = {};
            vectorLayer.eachLayer(l => {
                let name = (l.feature.properties[colFaz] || "").toString().trim();
                let nameUP = name.toUpperCase();
                let show = false;
                if (mode === 'txt' && listaFiltroTxt.includes(nameUP)) show = true;
                else if (mode !== 'txt' && s1 !== "" && (nameUP === s1 || nameUP === s2)) show = true;

                if (show) {
                    if (!groups[name]) groups[name] = L.latLngBounds();
                    groups[name].extend(l.getBounds());
                }
            });

            for (let n in groups) {
                L.marker(groups[n].getCenter(), { icon: L.divIcon({ className: 'farm-label', html: n, iconSize: null }) }).addTo(labelLayer);
            }
        }

        // LÓGICA DE ROTAS RESTRITA
        function updateRouteLogic() {
            const mode = document.querySelector('input[name="routeMode"]:checked').value;
            const s1 = document.getElementById('fazendaSelect').value;
            const s2 = document.getElementById('fazendaDestSelect').value;
            const btn = document.getElementById('routeLink');

            // MODO TXT: O botão de rota morre aqui
            if (mode === 'txt') {
                btn.style.display = 'none';
                return;
            }

            if (s1 !== "") {
                let b1 = L.latLngBounds();
                vectorLayer.eachLayer(l => { if(l.feature.properties[colFaz].toUpperCase() === s1.toUpperCase()) b1.extend(l.getBounds()); });
                
                if (mode === 'atual') {
                    const c = b1.getCenter();
                    btn.href = `https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}`;
                    btn.style.display = 'block';
                    map.fitBounds(b1, {padding:[40,40]});
                } else if (mode === 'farms' && s2 !== "") {
                    let b2 = L.latLngBounds();
                    vectorLayer.eachLayer(l => { if(l.feature.properties[colFaz].toUpperCase() === s2.toUpperCase()) b2.extend(l.getBounds()); });
                    const c1 = b1.getCenter(), c2 = b2.getCenter();
                    btn.href = `https://www.google.com/maps/dir/?api=1&origin=${c1.lat},${c1.lng}&destination=${c2.lat},${c2.lng}`;
                    btn.style.display = 'block';
                    map.fitBounds(b1.extend(b2), {padding:[50,50]});
                } else {
                    btn.style.display = 'none';
                }
            } else {
                btn.style.display = 'none';
            }
        }

        function refresh() {
            const m = document.querySelector('input[name="viewMode"]:checked').value;
            if (satLayer) map.removeLayer(satLayer);
            if (m === 'ndvi' || m === 'real') {
                const it = galeriaImagens.find(i => i.data === document.getElementById('dateSelect').value);
                if (it) satLayer = L.tileLayer(it[m]).addTo(map);
            }
            if (vectorLayer) vectorLayer.setStyle(getStyle);
            updateLabels();
            updateRouteLogic();
        }

        document.querySelectorAll('input[name="routeMode"]').forEach(r => r.onchange = () => {
            const m = document.querySelector('input[name="routeMode"]:checked').value;
            document.getElementById('dest-box').style.display = (m === 'farms') ? 'block' : 'none';
            document.getElementById('txt-box').style.display = (m === 'txt') ? 'block' : 'none';
            document.getElementById('selector-box').style.display = (m === 'txt') ? 'none' : 'block';
            listaFiltroTxt = [];
            refresh();
        });

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                listaFiltroTxt = ev.target.result.split(/\r?\n/).map(l => l.trim().toUpperCase()).filter(l => l !== "");
                refresh();
                if(listaFiltroTxt.length > 0) {
                    let b = L.latLngBounds();
                    vectorLayer.eachLayer(l => { if(listaFiltroTxt.includes(l.feature.properties[colFaz].toUpperCase())) b.extend(l.getBounds()); });
                    map.fitBounds(b, {padding:[50,50]});
                }
            };
            reader.readAsText(e.target.files[0]);
        };

        if (typeof talhoesData !== 'undefined') {
            const ks = Object.keys(talhoesData.features[0].properties);
            colFaz = ks.find(k => ["FAZENDA", "NOME_FAZ", "DESC_FAZ"].includes(k.toUpperCase())) || ks[0];
            let ns = [...new Set(talhoesData.features.map(f => (f.properties[colFaz] || "").toString().trim()))].sort();
            ns.forEach(n => {
                if(n){
                    let o1 = document.createElement('option'); o1.value = n; o1.text = n; document.getElementById('fazendaSelect').appendChild(o1);
                    let o2 = document.createElement('option'); o2.value = n; o2.text = n; document.getElementById('fazendaDestSelect').appendChild(o2);
                }
            });
            vectorLayer = L.geoJSON(talhoesData, { style: getStyle, onEachFeature: (f, l) => {
                let h = "<table>"; for (let k in f.properties) h += `<tr><td><b>${k}</b></td><td>${f.properties[k]}</td></tr>`;
                l.bindPopup(h + "</table>");
            }}).addTo(map);
        }

        const ds = document.getElementById('dateSelect');
        galeriaImagens.forEach(i => { let o = document.createElement('option'); o.value = i.data; o.text = `${i.nome_mes} (${i.data})`; ds.appendChild(o); });
        
        document.getElementById('fazendaSelect').onchange = refresh;
        document.getElementById('fazendaDestSelect').onchange = refresh;
        document.getElementById('checkLabels').onchange = updateLabels;
        document.querySelectorAll('input[name="viewMode"]').forEach(r => r.onchange = refresh);
        ds.onchange = refresh;
        refresh();
    </script>
</body>
</html>
