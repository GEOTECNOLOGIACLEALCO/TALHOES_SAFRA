<body>
    
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    var mapObj = null;
    var tilesCarregados = new Set();

    $(document).ready(function() {
        setTimeout(function() {
            var mapId = document.querySelector('.folium-map').id;
            mapObj = window[mapId];
            
            $.getJSON("manifesto.json", function(manifesto) {
                mapObj.on('moveend', function() {
                    verificarEGrid(manifesto);
                });
                verificarEGrid(manifesto); // Carga inicial
            });
        }, 500);
    });

    function verificarEGrid(manifesto) {
        var viewBounds = mapObj.getBounds();
        
        manifesto.forEach(function(tile) {
            var tileBounds = L.latLngBounds(tile.bounds);
            
            if (viewBounds.intersects(tileBounds) && !tilesCarregados.has(tile.arquivo)) {
                tilesCarregados.add(tile.arquivo);
                $.getJSON("tiles/" + tile.arquivo, function(data) {
                    L.geoJson(data, {
                        style: function(f) {
                            var v = f.properties.CLASSE;
                            var c = v <= 150 ? '#8c0000' : v <= 300 ? '#ff0000' : v <= 450 ? '#ffff00' : v <= 700 ? '#00ff00' : '#00fffa';
                            return { color: c, weight: 1, opacity: 0.6 };
                        },
                        onEachFeature: function(feature, layer) {
                            layer.bindTooltip("Fazenda: " + feature.properties.FAZENDA + "<br>Talhão: " + feature.properties.TALHAO);
                        }
                    }).addTo(mapObj);
                });
            }
        });
    }
    </script>
