<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Clealco Geo - Logística e NDVI</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .ui-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1001;
            background: rgba(255, 255, 255, 0.98); padding: 15px;
            border-radius: 15px; width: 270px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: 0.4s; max-height: 90vh; overflow-y: auto;
        }
        .ui-panel.hidden { transform: translateX(-350px); }
        .toggle-btn { position: absolute; top: 15px; left: 15px; z-index: 1002; background: #1b5e20; color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        h2 { margin: 0; font-size: 16px; color: #1b5e20; border-bottom: 1px solid #ddd; padding-bottom: 5px; display: flex; justify-content: space-between; }
        .label-ui { font-size: 9px; font-weight: 700; color: #888; margin-top: 12px; text-transform: uppercase; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; font-size: 12px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
        .btn-group label { flex: 1 1 30%; background: #eee; padding: 8px 2px; text-align: center; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: 600; }
        .btn-group input { display: none; }
        .btn-group input:checked + label { background: #1b5e20; color: #fff; }
        .route-box { background: #e3f2fd; padding: 10px; border-radius: 10px; margin-top: 15px; border: 1px solid #bbdefb; }
        .go-btn { width: 100%; background: #1565c0; color: white; border: none; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        #nuvemInfo { font-size: 10px; color: #e65100; font-weight: bold; margin-top: 5px; }
        .main-logo { position: absolute; top: 15px; right: 15px; z-index: 1000; width: 90px; }
        .dev-footer { position: absolute; bottom: 10px; right: 15px; z-index: 1000; font-size: 9px; color: rgba(255,255,255,0.4); }
        .leaflet-top.leaflet-right { margin-top: 60px !important; }
    </style>
</head>
<body>

    <script>if(sessionStorage.getItem('autenticado')!=='true') window.location.href='login.html';</script>

    <button class="toggle-btn" id="openBtn" style="display:none;">☰ MENU</button>
    <img src="logo.png" class="main-logo">
    <div class="dev-footer">Desenvolvido por Geotecnologias</div>

    <div class="ui-panel" id="panel">
        <h2>Gestão Safra <span style="cursor:pointer" id="hideBtn">×</span></h2>
        
        <div class="label-ui">Monitoramento Satélite</div>
        <div class="btn-group">
            <input type="radio" id="mNdvi" name="viewMode" value="ndvi" checked><label for="mNdvi">NDVI</label>
            <input type="radio" id="mReal" name="viewMode" value="real"><label for="mReal">REAL</label>
        </div>
        <select id="dateSelect"></select>
        <div id="nuvemInfo"></div>

        <div class="label-ui">Filtro de Mapa</div>
        <select id="fazendaFiltro"><option value="">Todas as Fazendas</option></select>

        <div class="route-box">
            <div class="label-ui" style="color:#1565c0">📍 Rota entre Fazendas</div>
            <select id="rotaOrigem"><option value="">Origem...</option></select>
            <select id="rotaDestino" style="margin-top:5px;"><option value="">Destino...</option></select>
            <button class="go-btn" onclick="gerarRotaDuo()">TRAÇAR LOGÍSTICA</button>
        </div>

        <div class="label-ui">Temas de Campo</div>
        <div class="btn-group">
            <input type="radio" id="tNone" name="viewMode" value="none"><label for="tNone">LIMPO</label>
            <input type="radio" id="tEst" name="viewMode" value="ESTAGIO"><label for="tEst">ESTÁGIO</label>
            <input type="radio" id="tSta" name="viewMode" value="STATUS"><label for="tSta">STATUS</label>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>
    <script src="config.js"></script>
    <script>
        var map = L.map('map', {zoomControl: false, tap: false}).setView([-21.2, -50.4], 12);
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {attr: 'Google'}).addTo(map);
        L.control.locate({position: 'topright'}).addTo(map);

        const p = document.getElementById('panel'), ob = document.getElementById('openBtn'), hb = document.getElementById('hideBtn');
        hb.onclick = () => { p.classList.add('hidden'); ob.style.display = 'block'; };
        ob.onclick = () => { p.classList.remove('hidden'); ob.style.display = 'none'; };

        var satLayer = null, vectorLayer = null, colFaz = "";

        function refresh() {
            const m = document.querySelector('input[name="viewMode"]:checked').value;
            const ni = document.getElementById('nuvemInfo');
            if (satLayer) map.removeLayer(satLayer);
            const it = galeriaImagens.find(i => i.data === document.getElementById('dateSelect').value);
            if (it && (m === 'ndvi' || m === 'real')) {
                satLayer = L.tileLayer(it[m]).addTo(map);
                ni.innerHTML = `☁️ Nuvens: ${it.nuvem}%`;
            } else ni.innerHTML = "";
            if (vectorLayer) vectorLayer.setStyle(f => {
                let s = { color: "#000", weight: 1, fillColor: 'transparent', fillOpacity: 0 };
                const fazAtiva = document.getElementById('fazendaFiltro').value;
                if (fazAtiva && f.properties[colFaz] === fazAtiva) { s.color = "#FF0"; s.weight = 3; s.fillOpacity = 0.2; }
                return s;
            });
        }

        function gerarRotaDuo() {
            const o = document.getElementById('rotaOrigem').value;
            const d = document.getElementById('rotaDestino').value;
            if (!o || !d) return alert("Selecione Origem e Destino!");
            
            let pOrigem, pDestino;
            vectorLayer.eachLayer(l => {
                if (l.feature.properties[colFaz] === o) pOrigem = l.getBounds().getCenter();
                if (l.feature.properties[colFaz] === d) pDestino = l.getBounds().getCenter();
            });
            window.open(`https://www.google.com/maps/dir/${pOrigem.lat},${pOrigem.lng}/${pDestino.lat},${pDestino.lng}/`);
        }

        if (typeof talhoesData !== 'undefined') {
            const ks = Object.keys(talhoesData.features[0].properties);
            colFaz = ks.find(k => ["FAZENDA", "NOME_FAZ"].includes(k.toUpperCase())) || ks[0];
            const fs = document.getElementById('fazendaFiltro'), ro = document.getElementById('rotaOrigem'), rd = document.getElementById('rotaDestino');
            let ns = [...new Set(talhoesData.features.map(f => f.properties[colFaz]))].sort();
            ns.forEach(n => {
                if(n) {
                    [fs, ro, rd].forEach(s => { let opt = new Option(n, n); s.add(opt); });
                }
            });
            vectorLayer = L.geoJSON(talhoesData).addTo(map);
        }

        const ds = document.getElementById('dateSelect');
        galeriaImagens.forEach(i => ds.add(new Option(`${i.nome_mes} (${i.data})`, i.data)));
        document.querySelectorAll('input[name="viewMode"]').forEach(r => r.onchange = refresh);
        ds.onchange = refresh;
        document.getElementById('fazendaFiltro').onchange = () => {
            const faz = document.getElementById('fazendaFiltro').value;
            if (faz) {
                let b = L.latLngBounds();
                vectorLayer.eachLayer(l => { if (l.feature.properties[colFaz] === faz) b.extend(l.getBounds()); });
                map.fitBounds(b);
            }
            refresh();
        };
        refresh();
    </script>
</body>
</html>
