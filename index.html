<body>
    
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    var mapObj = null;
    var tilesCarregados = new Set();
    var fazendaFiltro = "";
    var temaAtual = 1; 
    var camadasGeojson = [];
    var marcadoresRotulos = [];

    $(document).ready(function() {
        setTimeout(function() {
            var mapId = document.querySelector('.folium-map').id;
            mapObj = window[mapId];
            
            $.getJSON("manifesto.json", function(data) {
                mapObj.on('moveend', function() { verificarTiles(data); });
                verificarTiles(data);
            });
        }, 500);
    });

    function mudarTema(novoTema) {
        temaAtual = novoTema;
        reestilizarTudo();
        document.getElementById('legenda_tiro').style.display = (temaAtual == 1) ? 'block' : 'none';
    }

    function filtrarFazenda() {
        fazendaFiltro = document.getElementById('input_fazenda').value;
        reestilizarTudo();
    }

    function reestilizarTudo() {
        camadasGeojson.forEach(function(camada) {
            camada.eachLayer(function(layer) {
                var prop = layer.feature.properties;
                var visivel = (fazendaFiltro === "" || prop.FAZENDA === fazendaFiltro);
                
                if (!visivel) {
                    layer.setStyle({ opacity: 0, weight: 0 });
                } else {
                    var cor = (temaAtual == 1) ? corClasseJS(prop.CLASSE) : prop.color_talhao;
                    layer.setStyle({ color: cor, weight: 1, opacity: 0.8 });
                }
            });
        });
        
        marcadoresRotulos.forEach(function(m) {
            var deveAparecer = (temaAtual == 2) && (fazendaFiltro === "" || m.options.alt === fazendaFiltro);
            if (deveAparecer) { m.addTo(mapObj); } else { mapObj.removeLayer(m); }
        });
    }

    function corClasseJS(v) {
        return v <= 150 ? '#8c0000' : v <= 300 ? '#ff0000' : v <= 450 ? '#ffff00' : v <= 700 ? '#00ff00' : '#00fffa';
    }

    function verificarTiles(manifesto) {
        var viewBounds = mapObj.getBounds();
        manifesto.forEach(function(tile) {
            var tileBounds = L.latLngBounds(tile.bounds);
            if (viewBounds.intersects(tileBounds) && !tilesCarregados.has(tile.arquivo)) {
                tilesCarregados.add(tile.arquivo);
                $.getJSON("tiles/" + tile.arquivo, function(geoData) {
                    var novaCamada = L.geoJson(geoData, {
                        onEachFeature: function(feature, layer) {
                            layer.bindTooltip("Talhão: " + feature.properties.TALHAO);
                            var centro = layer.getBounds().getCenter();
                            var marker = L.marker(centro, {
                                icon: L.divIcon({
                                    className: 'rotulo-agro',
                                    html: '<div style="color:white; font-weight:bold; background:rgba(0,0,0,0.5); padding:2px; border-radius:3px; font-size:9px;">' + feature.properties.TALHAO + '</div>'
                                }),
                                alt: feature.properties.FAZENDA
                            });
                            marcadoresRotulos.push(marker);
                        }
                    });
                    novaCamada.addTo(mapObj);
                    camadasGeojson.push(novaCamada);
                    reestilizarTudo();
                });
            }
        });
    }
    </script>
    
    
    <div style="position: fixed; top: 10px; left: 50px; z-index: 9999; background: white; padding: 15px; 
                border-radius: 8px; border: 2px solid black; font-family: sans-serif; width: 220px;">
        <b>🚜 DASHBOARD AGRO</b><br><br>
        <input list="lista_fazendas" id="input_fazenda" oninput="filtrarFazenda()" placeholder="Filtrar Fazenda..." style="width: 100%;"><br><br>
        <input type="radio" name="tema" onclick="mudarTema(1)" checked> Tema 01 - Classes<br>
        <input type="radio" name="tema" onclick="mudarTema(2)"> Tema 02 - Talhões<br><br>
        <button onclick="location.reload()" style="width: 100%;">Resetar Mapa</button>
        <datalist id="lista_fazendas"><option value="300044"><option value="300492"><option value="301482"><option value="302979 - 302980"><option value="302981"><option value="306513"><option value="307214"><option value="307345"><option value="308054"></datalist>
    </div>
    
    <div id="legenda_tiro" style="position: fixed; bottom: 30px; left: 30px; width: 130px; z-index:9999; background: white; padding: 10px; border: 2px solid black; font-size: 11px;"><b>Legenda Tiro</b><br><i style="background:#8c0000;width:8px;height:8px;display:inline-block"></i> 0-150<br><i style="background:#ff0000;width:8px;height:8px;display:inline-block"></i> 150-300<br><i style="background:#ffff00;width:8px;height:8px;display:inline-block"></i> 300-450<br><i style="background:#00ff00;width:8px;height:8px;display:inline-block"></i> 450-700<br><i style="background:#00fffa;width:8px;height:8px;display:inline-block"></i> > 700</div>
