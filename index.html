<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Clealco Geo - Filtro por Lista</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b5e20; --accent: #4285F4; --dark: #000; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark); overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .ui-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1001;
            background: rgba(255, 255, 255, 0.98); padding: 20px;
            border-radius: 15px; width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: all 0.4s ease; max-height: 90vh; overflow-y: auto;
        }
        .ui-panel.hidden { transform: translateX(-340px); opacity: 0; }

        .toggle-menu {
            position: absolute; top: 15px; left: 15px; z-index: 1002;
            background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
        }

        h2 { margin: 0 0 10px; font-size: 16px; color: var(--primary); border-bottom: 1px solid #ddd; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .close-icon { cursor: pointer; color: #999; font-size: 24px; }

        .label-ui { font-size: 10px; font-weight: 700; color: #888; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; font-size: 14px; background: #fff; }

        /* Estilo Botão Upload TXT */
        .file-upload-wrapper { margin-top: 10px; position: relative; }
        .file-upload-btn {
            display: block; width: 100%; background: #555; color: white;
            padding: 10px; border-radius: 8px; text-align: center;
            font-size: 11px; font-weight: bold; cursor: pointer; border: 1px dashed #fff;
        }
        #fileInput { display: none; }
        .reset-filter { font-size: 9px; color: #d32f2f; cursor: pointer; text-decoration: underline; margin-top: 5px; display: none; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
        .btn-group label { flex: 1 1 30%; background: #f0f0f0; padding: 10px 2px; text-align: center; border-radius: 8px; font-size: 10px; cursor: pointer; font-weight: 600; }
        .btn-group input { display: none; }
        .btn-group input:checked + label { background: var(--primary); color: #fff; }

        .route-btn { display: none; width: 100%; background: var(--accent); color: white; padding: 14px; border-radius: 10px; margin-top: 15px; font-weight: 700; text-decoration: none; text-align: center; font-size: 13px; }
        .main-logo { position: absolute; top: 15px; right: 15px; z-index: 1000; width: 110px; }
        .dev-footer { position: absolute; bottom: 10px; right: 15px; z-index: 1000; font-size: 10px; color: rgba(255,255,255,0.4); }
        .leaflet-top.leaflet-right { margin-top: 60px !important; }
    </style>
</head>
<body>

    <script>if(sessionStorage.getItem('autenticado')!=='true') window.location.href='login.html';</script>

    <button class="toggle-menu" id="openBtn" style="display: none;">☰ FILTROS</button>
    <img src="logo.png" class="main-logo">
    <div class="dev-footer">Desenvolvido por Geotecnologias</div>

    <div class="ui-panel" id="panel">
        <h2>Painel Geotec <span class="close-icon" id="closeBtn">×</span></h2>
        
        <div class="label-ui">📍 Seleção Manual</div>
        <select id="fazendaSelect"><option value="">Todas as Fazendas</option></select>

        <div class="label-ui">📂 Importar Lista (.txt)</div>
        <div class="file-upload-wrapper">
            <label for="fileInput" class="file-upload-btn" id="fileLabel">📁 SELECIONAR ARQUIVO TXT</label>
            <input type="file" id="fileInput" accept=".txt">
            <div id="resetTxt" class="reset-filter" onclick="limparFiltroTxt()">Limpar lista importada</div>
        </div>
        
        <a id="routeLink" target="_blank" class="route-btn">🚗 TRAÇAR ROTA</a>

        <div class="label-ui">Monitoramento Satélite</div>
        <div class="btn-group">
            <input type="radio" id="mNdvi" name="viewMode" value="ndvi" checked><label for="mNdvi">NDVI</label>
            <input type="radio" id="mReal" name="viewMode" value="real"><label for="mReal">REAL</label>
        </div>
        <select id="dateSelect"></select>

        <div class="label-ui">Mapas de Campo</div>
        <div class="btn-group">
            <input type="radio" id="tNone" name="viewMode" value="none"><label for="tNone">LIMPO</label>
            <input type="radio" id="tEst" name="viewMode" value="ESTAGIO"><label for="tEst">ESTÁGIO</label>
            <input type="radio" id="tSta" name="viewMode" value="STATUS"><label for="tSta">STATUS</label>
            <input type="radio" id="tFaz" name="viewMode" value="TP_FAZ"><label for="tFaz">TP_FAZ</label>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>
    <script src="config.js"></script>
    <script>
        var map = L.map('map', {zoomControl: false, tap: false}).setView([-21.2, -50.4], 12);
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {attr: 'Google'}).addTo(map);

        L.control.locate({position: 'topright'}).addTo(map);
        L.control.zoom({position: 'bottomleft'}).addTo(map);

        const panel = document.getElementById('panel'), openBtn = document.getElementById('openBtn'), closeBtn = document.getElementById('closeBtn');
        closeBtn.onclick = () => { panel.classList.add('hidden'); openBtn.style.display = 'block'; };
        openBtn.onclick = () => { panel.classList.remove('hidden'); openBtn.style.display = 'none'; };

        var satLayer = null, vectorLayer = null, colFaz = "";
        var listaFiltroTxt = new Set(); // Armazena a lista do arquivo TXT

        const cores = {
            'ESTAGIO': { '1': '#0039A6', '2': '#00BFFF', '3': '#00CD00', '4': '#FFFF00', '5': '#FF0000', '6+': '#8B0000', 'REFORMA': '#FF1493' },
            'STATUS': { 'COLHEITA': '#0039A6', 'PLANTIO': '#76FF03', 'MUDA': '#FF1493' },
            'TP_FAZ': { 'PROPRIA': '#FF8C00', 'FORNECEDORES': '#00CED1' }
        };

        function getStyle(f) {
            const m = document.querySelector('input[name="viewMode"]:checked').value;
            const fz = (f.properties[colFaz] || "").toString().trim().toUpperCase();
            const fzSel = document.getElementById('fazendaSelect').value.toUpperCase();
            
            let s = { color: "#000", weight: 1.5, fillColor: 'transparent', fillOpacity: 0 };
            
            if (cores[m]) {
                const v = (f.properties[m] || "").toString().toUpperCase().trim();
                if (cores[m][v]) { s.fillColor = cores[m][v]; s.fillOpacity = 0.8; }
            }

            // Lógica de Filtro: TXT ou Select Manual
            let emDestaque = false;
            if (listaFiltroTxt.size > 0) {
                if (listaFiltroTxt.has(fz)) emDestaque = true;
            } else if (fzSel !== "") {
                if (fz === fzSel) emDestaque = true;
            }

            if (listaFiltroTxt.size > 0 || fzSel !== "") {
                if (emDestaque) {
                    s.color = "#FF0"; s.weight = 3.5; s.fillOpacity = s.fillOpacity > 0 ? 0.9 : 0.2;
                } else {
                    s.fillOpacity *= 0.1; s.color = "rgba(0,0,0,0.1)";
                }
            }
            return s;
        }

        // --- LÓGICA DE IMPORTAÇÃO DE TXT ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                // Limpa e formata a lista (remove espaços e quebras de linha)
                listaFiltroTxt = new Set(text.split(/\r?\n/).map(s => s.trim().toUpperCase()).filter(s => s !== ""));
                
                document.getElementById('fileLabel').innerText = `📄 ${file.name} (${listaFiltroTxt.size} itens)`;
                document.getElementById('resetTxt').style.display = 'block';
                document.getElementById('fazendaSelect').value = ""; // Reseta o manual
                
                aplicarFiltroEZoom();
            };
            reader.readAsText(file);
        });

        function limparFiltroTxt() {
            listaFiltroTxt.clear();
            document.getElementById('fileInput').value = "";
            document.getElementById('fileLabel').innerText = "📁 SELECIONAR ARQUIVO TXT";
            document.getElementById('resetTxt').style.display = 'none';
            vectorLayer.setStyle(getStyle);
        }

        function aplicarFiltroEZoom() {
            let b = L.latLngBounds();
            let count = 0;
            vectorLayer.eachLayer(l => {
                const fz = (l.feature.properties[colFaz] || "").toString().trim().toUpperCase();
                if (listaFiltroTxt.has(fz)) {
                    b.extend(l.getBounds());
                    count++;
                }
            });

            if (count > 0) {
                map.fitBounds(b, {padding: [50, 50]});
                vectorLayer.setStyle(getStyle);
            } else {
                alert("Nenhuma fazenda da lista encontrada no mapa!");
            }
        }

        function refresh() {
            const m = document.querySelector('input[name="viewMode"]:checked').value;
            if (satLayer) map.removeLayer(satLayer);
            if (m === 'ndvi' || m === 'real') {
                const it = galeriaImagens.find(i => i.data === document.getElementById('dateSelect').value);
                if (it) satLayer = L.tileLayer(it[m]).addTo(map);
            }
            if (vectorLayer) vectorLayer.setStyle(getStyle);
        }

        // Carga Inicial e Popular Select
        if (typeof talhoesData !== 'undefined') {
            const ks = Object.keys(talhoesData.features[0].properties);
            colFaz = ks.find(k => ["FAZENDA", "NOME_FAZ", "DESC_FAZ"].includes(k.toUpperCase())) || ks[0];
            const fs = document.getElementById('fazendaSelect');
            let ns = [...new Set(talhoesData.features.map(f => (f.properties[colFaz] || "").toString().trim()))].sort();
            ns.forEach(n => { if(n){ let o = document.createElement('option'); o.value = n; o.text = n; fs.appendChild(o); }});
            
            vectorLayer = L.geoJSON(talhoesData, { style: getStyle, onEachFeature: (f, l) => {
                let h = "<table>";
                for (let k in f.properties) h += `<tr><td><b>${k}</b></td><td>${f.properties[k]}</td></tr>`;
                l.bindPopup(h + "</table>");
            }}).addTo(map);
        }

        const ds = document.getElementById('dateSelect');
        galeriaImagens.forEach(i => { let o = document.createElement('option'); o.value = i.data; o.text = `${i.nome_mes} (${i.data})`; ds.appendChild(o); });
        
        document.getElementById('fazendaSelect').onchange = () => {
            if (document.getElementById('fazendaSelect').value !== "") {
                listaFiltroTxt.clear(); // Se selecionou manual, apaga a lista TXT
                document.getElementById('resetTxt').style.display = 'none';
            }
            vectorLayer.setStyle(getStyle);
        };
        document.querySelectorAll('input[name="viewMode"]').forEach(r => r.onchange = refresh);
        ds.onchange = refresh;
        refresh();
    </script>
</body>
</html>
