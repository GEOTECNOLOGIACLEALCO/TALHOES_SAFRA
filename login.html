<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Login - Geotecnologia Clealco</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        
        .login-card {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px;
            border-radius: 20px; width: 320px; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            text-align: center; color: #333;
        }

        .logo-clealco { width: 140px; margin-bottom: 20px; }
        
        h2 { font-size: 18px; color: #1b5e20; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border-radius: 10px; border: 1px solid #ddd;
            box-sizing: border-box; font-size: 16px; outline: none;
        }

        input:focus { border-color: #1b5e20; box-shadow: 0 0 5px rgba(27,94,32,0.3); }

        button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #1b5e20; color: #fff; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.3s;
        }

        button:active { transform: scale(0.98); background: #0d3a13; }

        .error-msg { color: #d32f2f; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://www.clealco.com.br/assets/images/logo-footer.png" class="logo-clealco">
        <h2>Acesso Restrito</h2>
        
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha">
        
        <button onclick="validarAcesso()">ENTRAR NO SISTEMA</button>
        
        <div id="erro" class="error-msg">Usuário ou senha incorretos!</div>
    </div>

<script>
    // --- CONFIGURAÇÃO DO LOG (A "PLANILHA") ---
    // Você vai criar um Google Form e pegar o ID e o ID da pergunta.
    // Se não souber fazer, me avisa que eu te ensino a achar esses códigos.
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/u/0/d/e/SEU_ID_DO_FORM/formResponse";
    const ENTRY_ID = "entry.123456789"; // O ID da pergunta "usuario"

    async function gravarLogNaPlanilha(usuario) {
        const formData = new FormData();
        formData.append(ENTRY_ID, usuario);

        // Envia para o Google Forms em modo "quieto"
        fetch(GOOGLE_FORM_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        }).then(() => {
            console.log("Log registrado na planilha.");
        }).catch(() => {
            console.log("Erro ao registrar log, mas segue o baile.");
        });
    }

    function validarAcesso() {
        const uInput = document.getElementById('user').value.toLowerCase().trim();

        }

</script>
</body>
</html>
