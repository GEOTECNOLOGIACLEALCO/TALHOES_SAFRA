<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Login - Geotecnologia Clealco</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; color: #fff; }
        
        .login-card {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px;
            border-radius: 20px; width: 320px; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            text-align: center; color: #333;
        }

        .logo-clealco { width: 140px; margin-bottom: 20px; }
        
        h2 { font-size: 16px; color: #1b5e20; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border-radius: 10px; border: 1px solid #ddd;
            box-sizing: border-box; font-size: 16px; outline: none;
        }

        button {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background: #1b5e20; color: #fff; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.3s;
        }

        button:active { transform: scale(0.98); background: #0d3a13; }

        .error-msg { color: #d32f2f; font-size: 12px; margin-top: 10px; display: none; }
        
        .footer-tag { margin-top: 20px; font-size: 10px; color: #999; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo.png" class="logo-clealco" alt="Clealco">
        <h2>Acesso Restrito</h2>
        
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha">
        
        <button onclick="validarAcesso()">ENTRAR NO SISTEMA</button>
        
        <div id="erro" class="error-msg">Usuário ou senha incorretos!</div>
        <div class="footer-tag">Geotecnologia © 2026</div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DA PLANILHA (GOOGLE FORMS) ---
        const FORM_ID = "1FAIpQLSeNsoCkJvkPl0pRQcm5_prcUdpAVTAwlealXqop-AK3ixQzTg";
        const ENTRY_ID = "entry.1114366034";

        async function registrarAcessoNoGoogle(usuario) {
            const url = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;
            const formData = new FormData();
            formData.append(ENTRY_ID, usuario);

            // Envia o dado para o formulário no fundo (modo silencioso)
            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                console.log("Log registrado com sucesso.");
            }).catch(() => {
                console.log("Erro ao salvar log.");
            });
        }

        function validarAcesso() {
            const uInput = document.getElementById('user').value.toLowerCase().trim();
            const pInput = document.getElementById('pass').value;

            // --- SUA LISTA DE USUÁRIOS ---
            const usuariosAutorizados = [
                { u: "admin", p: "123" },
                { u: "admin.clealco", p: "safra2026" },
                { u: "diretoria", p: "clealco123" },
                { u: "campo.oeste", p: "agro2026" }
            ];

            const loginOk = usuariosAutorizados.find(user => user.u === uInput && user.p === pInput);

            if (loginOk) {
                // Registra na sua planilha antes de abrir o mapa
                registrarAcessoNoGoogle(loginOk.u);

                // Salva a sessão e redireciona
                sessionStorage.setItem('autenticado', 'true');
                sessionStorage.setItem('usuarioLogado', loginOk.u);
                window.location.href = "index.html";
            } else {
                document.getElementById('erro').style.display = 'block';
                if (navigator.vibrate) navigator.vibrate(200);
            }
        }

        // Atalho com a tecla Enter
        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') validarAcesso(); });
    </script>
</body>
</html>
